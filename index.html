<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOREM - New Era of Design</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --navy: #0a0e27;
    --blue-accent: #4d6bfe;
    --blue-light: #6c8cff;
    --white: #ffffff;
    --white-muted: rgba(255, 255, 255, 0.65);
    --white-dim: rgba(255, 255, 255, 0.4);
  }

  html, body {
    height: 100%;
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--navy);
    color: var(--white);
    overflow-x: hidden;
  }

  /* ── Video Background ── */
  .hero {
    position: relative;
    width: 100%;
    height: 100vh;
    min-height: 700px;
    overflow: hidden;
  }

  .hero-video-wrap {
    position: absolute;
    inset: 0;
    z-index: 0;
  }

  .hero-video-wrap video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  #heroVideoLoop {
    display: none;
  }

  /* Gradient overlay for text readability */
  .hero-overlay {
    position: absolute;
    inset: 0;
    z-index: 1;
    background:
      linear-gradient(180deg,
        rgba(10, 14, 39, 0.55) 0%,
        rgba(10, 14, 39, 0.15) 35%,
        rgba(10, 14, 39, 0.10) 60%,
        rgba(10, 14, 39, 0.65) 100%
      ),
      linear-gradient(90deg,
        rgba(10, 14, 39, 0.5) 0%,
        rgba(10, 14, 39, 0.0) 55%
      );
    pointer-events: none;
  }

  /* ── Navbar ── */
  .navbar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 48px;
  }

  .nav-left {
    display: flex;
    align-items: center;
    gap: 40px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: var(--white);
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--blue-accent), var(--blue-light));
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-icon svg {
    width: 18px;
    height: 18px;
    fill: var(--white);
  }

  .logo-text {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 32px;
    list-style: none;
  }

  .nav-links a {
    color: var(--white-muted);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    transition: color 0.25s ease;
  }

  .nav-links a:hover {
    color: var(--white);
  }

  .nav-cta {
    background: var(--blue-accent);
    color: var(--white) !important;
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-decoration: none;
    transition: background 0.25s ease, transform 0.2s ease;
    white-space: nowrap;
  }

  .nav-cta:hover {
    background: var(--blue-light);
    transform: translateY(-1px);
  }

  /* ── Hero Content ── */
  .hero-content {
    position: relative;
    z-index: 5;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 48px;
    max-width: 1440px;
    margin: 0 auto;
  }

  .hero-heading {
    font-size: clamp(42px, 6vw, 80px);
    font-weight: 800;
    line-height: 1.05;
    text-transform: uppercase;
    letter-spacing: -1px;
    max-width: 580px;
    margin-bottom: 36px;
  }

  .hero-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 32px;
    border: 2px solid var(--white);
    border-radius: 10px;
    background: transparent;
    color: var(--white);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.25s ease, transform 0.2s ease;
    width: fit-content;
  }

  .hero-btn:hover {
    background: rgba(255, 255, 255, 0.12);
    transform: translateY(-2px);
  }

  /* ── Bottom Card ── */
  .bottom-card {
    position: absolute;
    bottom: 40px;
    left: 48px;
    z-index: 5;
    background: rgba(255, 255, 255, 0.07);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 16px;
    padding: 28px 32px;
    max-width: 340px;
  }

  .card-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--white-dim);
    margin-bottom: 12px;
  }

  .card-heading {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.25;
    margin-bottom: 10px;
  }

  .card-heading em {
    font-style: italic;
    color: var(--blue-light);
  }

  .card-body {
    font-size: 13px;
    line-height: 1.6;
    color: var(--white-muted);
  }

  /* ── Entrance Animations ── */
  @keyframes fadeSlideUp {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .hero-heading {
    animation: fadeSlideUp 0.9s ease-out 0.3s both;
  }

  .hero-btn {
    animation: fadeSlideUp 0.9s ease-out 0.55s both;
  }

  .bottom-card {
    animation: fadeSlideUp 0.9s ease-out 0.8s both;
  }

  .navbar {
    animation: fadeIn 0.7s ease-out 0.1s both;
  }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .navbar {
      padding: 16px 24px;
    }

    .nav-links {
      display: none;
    }

    .hero-content {
      padding: 0 24px;
    }

    .hero-heading {
      font-size: 36px;
      max-width: 100%;
    }

    .bottom-card {
      left: 24px;
      right: 24px;
      max-width: none;
      bottom: 24px;
    }
  }
</style>
</head>
<body>

<section class="hero">
  <!-- Video Background -->
  <div class="hero-video-wrap">
    <video id="heroVideoIntro" autoplay muted playsinline>
      <source src="hero_intro.mp4" type="video/mp4">
    </video>
    <video id="heroVideoLoop" loop muted playsinline>
      <source src="hero_loop_clean.mp4" type="video/mp4">
    </video>
  </div>

  <!-- Overlay -->
  <div class="hero-overlay"></div>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-left">
      <a href="#" class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4" stroke="#fff" stroke-width="2" fill="none"/></svg>
        </div>
        <span class="logo-text">Lorem</span>
      </a>
      <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Contact Us</a></li>
      </ul>
    </div>
    <a href="#" class="nav-cta">Contact Us</a>
  </nav>

  <!-- Hero Content -->
  <div class="hero-content">
    <h1 class="hero-heading">New Era<br>of Design<br>Starts Now</h1>
    <button class="hero-btn">Get Started</button>
  </div>

  <!-- Bottom Card -->
  <div class="bottom-card">
    <div class="card-label">Text</div>
    <h3 class="card-heading">Taught by <em>Industry</em> Professionals</h3>
    <p class="card-body">The principal aim and objective for the user community and beyond.</p>
  </div>
</section>

<script>
  const intro = document.getElementById('heroVideoIntro');
  const loop = document.getElementById('heroVideoLoop');

  intro.addEventListener('ended', () => {
    intro.style.display = 'none';
    loop.style.display = 'block';
    loop.play();
  });
</script>

</body>
</html>
